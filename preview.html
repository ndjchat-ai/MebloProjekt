<!doctype html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MebloProjekt — podgląd bez budowania</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body>
    <div id="root">
      <div style="padding:24px;font-family:system-ui,sans-serif;color:#444">
        Ładowanie podglądu MebloProjekt…
      </div>
    </div>
    <script>
      (async function bootPreview() {
        const root = document.getElementById("root");

        function showError(error) {
          root.innerHTML = `
            <main style="padding:24px;font-family:system-ui,sans-serif;max-width:900px;margin:auto">
              <h1 style="font-size:24px;font-weight:700;color:#991b1b">Nie udało się uruchomić podglądu</h1>
              <p>Uruchom plik przez lokalny serwer, np.:</p>
              <pre style="background:#f5f5f4;padding:12px;border-radius:8px;overflow:auto">python3 -m http.server 5173</pre>
              <p>Następnie otwórz:</p>
              <pre style="background:#f5f5f4;padding:12px;border-radius:8px;overflow:auto">http://localhost:5173/preview.html</pre>
              <pre style="margin-top:16px;background:#fee2e2;color:#7f1d1d;padding:12px;border-radius:8px;white-space:pre-wrap">${String(error && (error.stack || error.message || error)).replace(/[&<>]/g, (ch) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;" }[ch]))}</pre>
            </main>`;
        }

        try {
          const response = await fetch("./szafki.jsx", { cache: "no-store" });
          if (!response.ok) throw new Error(`Nie mogę pobrać szafki.jsx: ${response.status} ${response.statusText}`);

          const source = await response.text();
          const previewSource = source
            .replace(/import React, \{([^}]+)\} from ["']react["'];/, "const {$1} = React;")
            .replace(/export default function App\s*\(/, "function App(")
            + `\n\nReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));`;

          const compiled = Babel.transform(previewSource, {
            presets: [["react", { runtime: "classic" }]],
            filename: "szafki.jsx",
          }).code;

          new Function("React", "ReactDOM", compiled)(React, ReactDOM);
        } catch (error) {
          showError(error);
        }
      })();
    </script>
  </body>
</html>
