name: Deploy Web Preview

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'claude-zmiany.txt'
      - 'AI_NOTES.md'
      - 'AGENTS.md'
      - 'README.md'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Prepare static preview
        run: |
          mkdir web-preview
          cp standalone.html web-preview/index.html
          cp standalone.html preview.html szafki.jsx web-preview/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload static preview
        uses: actions/upload-pages-artifact@v3
        with:
          path: web-preview

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
